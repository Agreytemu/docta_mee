<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Acquisition | Docta Mee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .sidebar { background: #0b1222; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-link { transition: 0.3s; border-radius: 1rem; color: #94a3b8; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .input-node { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 1.25rem; padding: 1rem; color: white; outline: none; transition: 0.3s; width: 100%; }
        .input-node:focus { border-color: #10b981; background: #1e293b; box-shadow: 0 0 20px rgba(16, 185, 129, 0.05); }
        .glass-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; }
        .sync-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex">

    <aside class="sidebar w-72 fixed h-full flex flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i class="fas fa-truck-fast text-white"></i>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">docta.mee</h1>
        </div>
        <nav class="flex-1 space-y-1">
            <a href="dashboard.html" class="nav-link flex items-center gap-4 p-4 font-bold text-xs"><i class="fas fa-th-large w-5"></i> DASHBOARD</a>
            <a href="sales.html" class="nav-link flex items-center gap-4 p-4 font-bold text-xs"><i class="fas fa-cash-register w-5"></i> SALES</a>
            <a href="inventory.html" class="nav-link flex items-center gap-4 p-4 font-bold text-xs"><i class="fas fa-boxes-stacked w-5"></i> INVENTORY</a>
            <a href="purchases.html" class="nav-link active flex items-center gap-4 p-4 font-black text-xs text-emerald-400"><i class="fas fa-cart-plus w-5"></i> PURCHASES</a>
        </nav>
    </aside>

    <main class="flex-1 ml-72 p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Stock Entry Node</h2>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em]">Synchronizing Purchases with Global Inventory</p>
            </div>
            <div id="sync-status" class="flex items-center gap-3 bg-emerald-500/5 px-6 py-3 rounded-2xl border border-emerald-500/10">
                <div class="w-2 h-2 bg-emerald-500 rounded-full sync-badge"></div>
                <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Inventory Link: Active</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 glass-card p-10">
                <div class="flex items-center gap-3 mb-8">
                    <i class="fas fa-plus-circle text-emerald-500"></i>
                    <h4 class="font-black text-xs uppercase italic tracking-widest">New Acquisition Entry</h4>
                </div>

                <form id="purchase-form" class="space-y-6">
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase ml-2 mb-2 block">Product Identity</label>
                        <input type="text" id="p-name" class="input-node text-sm font-bold" placeholder="e.g. iPhone 15 Pro" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-500 uppercase ml-2 mb-2 block">Buying Cost (Unit)</label>
                            <input type="number" id="p-cost" oninput="calculateStats()" class="input-node text-sm font-bold" placeholder="0.00" required>
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-500 uppercase ml-2 mb-2 block">Selling Price (Unit)</label>
                            <input type="number" id="p-price" oninput="calculateStats()" class="input-node text-sm font-bold" placeholder="0.00" required>
                        </div>
                    </div>

                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase ml-2 mb-2 block">Quantity Received</label>
                        <input type="number" id="p-qty" oninput="calculateStats()" class="input-node text-sm font-bold" placeholder="Quantity" required>
                    </div>

                    <div class="bg-black/20 rounded-2xl p-6 space-y-3 border border-white/5">
                        <div class="flex justify-between">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Total Investment</span>
                            <span id="stat-total-investment" class="text-xs font-black text-white">TZS 0</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Projected Profit Margin</span>
                            <span id="stat-margin" class="text-[10px] font-black text-emerald-500">0%</span>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-black text-xs uppercase transition-all shadow-xl shadow-emerald-600/10 group">
                        Confirm & Sync to Inventory <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition"></i>
                    </button>
                </form>
            </div>

            <div class="lg:col-span-7 glass-card p-10">
                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-history text-slate-500"></i>
                        <h4 class="font-black text-xs uppercase italic tracking-widest text-slate-400">Recent Sync Logs</h4>
                    </div>
                </div>

                <div class="overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[9px] font-black text-slate-600 uppercase tracking-widest border-b border-white/5">
                                <th class="pb-6">Date</th>
                                <th class="pb-6">Product</th>
                                <th class="pb-6">Qty</th>
                                <th class="pb-6">Total Cost</th>
                                <th class="pb-6">Action</th>
                            </tr>
                        </thead>
                        <tbody id="purchase-log" class="text-xs font-bold divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://lhviiczzlctaocngofbq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxodmlpY3p6bGN0YW9jbmdvZmJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDYyMjksImV4cCI6MjA4ODI4MjIyOX0.e1-M8ATbS4kk2Fsw_XgyQGLtFNUz6vTEpRjFGbPRF7M";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userEmail = "";

        async function startup() {
            const { data: { user } } = await _supabase.auth.getUser();
            if(!user) { window.location.href = "login_retail.html"; return; }
            userEmail = user.email;
            loadLogs();
        }

        // MAUJANJA: Piga hesabu wakati anajaza
        function calculateStats() {
            const cost = parseFloat(document.getElementById('p-cost').value) || 0;
            const price = parseFloat(document.getElementById('p-price').value) || 0;
            const qty = parseInt(document.getElementById('p-qty').value) || 0;

            const total = cost * qty;
            document.getElementById('stat-total-investment').innerText = `TZS ${total.toLocaleString()}`;

            if(cost > 0) {
                const margin = ((price - cost) / cost) * 100;
                document.getElementById('stat-margin').innerText = `${margin.toFixed(1)}% Profit`;
            }
        }

        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Synchronizing Nodes...`;
            btn.disabled = true;

            const name = document.getElementById('p-name').value;
            const cost = parseFloat(document.getElementById('p-cost').value);
            const price = parseFloat(document.getElementById('p-price').value);
            const qty = parseInt(document.getElementById('p-qty').value);

            try {
                // STEP 1: Tafuta kama bidhaa ipo Inventory
                const { data: existing } = await _supabase
                    .from('inventory')
                    .select('*')
                    .eq('name', name)
                    .eq('owner_email', userEmail)
                    .single();

                if(existing) {
                    // Update Quantity & Price
                    await _supabase.from('inventory').update({
                        quantity: existing.quantity + qty,
                        price: price,
                        cost_price: cost
                    }).eq('id', existing.id);
                } else {
                    // Insert New Product
                    await _supabase.from('inventory').insert([{
                        name, quantity: qty, price, cost_price: cost, owner_email: userEmail
                    }]);
                }

                // STEP 2: Tunza log ya Purchase
                await _supabase.from('purchases').insert([{
                    product_name: name,
                    quantity: qty,
                    cost_price: cost,
                    total_cost: cost * qty,
                    owner_email: userEmail
                }]);

                Swal.fire({
                    icon: 'success',
                    title: 'Sync Success',
                    text: 'Inventory updated across all nodes!',
                    background: '#0f172a',
                    color: '#fff',
                    confirmButtonColor: '#10b981'
                });

                e.target.reset();
                calculateStats();
                loadLogs();

            } catch (err) {
                console.error(err);
                alert("Critical Sync Error!");
            } finally {
                btn.innerHTML = `Confirm & Sync to Inventory <i class="fas fa-arrow-right ml-2"></i>`;
                btn.disabled = false;
            }
        });

        async function loadLogs() {
            const { data: logs } = await _supabase
                .from('purchases')
                .select('*')
                .eq('owner_email', userEmail)
                .order('created_at', { ascending: false })
                .limit(8);

            const tbody = document.getElementById('purchase-log');
            tbody.innerHTML = '';

            logs?.forEach(log => {
                const date = new Date(log.created_at).toLocaleDateString('en-GB');
                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 transition group">
                        <td class="py-5 text-slate-500 text-[10px]">${date}</td>
                        <td class="py-5 uppercase tracking-tighter">${log.product_name}</td>
                        <td class="py-5 text-emerald-500">+${log.quantity}</td>
                        <td class="py-5">TZS ${log.total_cost.toLocaleString()}</td>
                        <td class="py-5"><i class="fas fa-check-circle text-emerald-500/30 group-hover:text-emerald-500 transition"></i></td>
                    </tr>
                `;
            });
        }

        startup();
    </script>
</body>
</html>
